<!doctype html>
<html lang="{{ ui_language_mode|default('en') }}">
<head>
  <meta charset="utf-8">
  <title>{{ tr("Label Enricher") }}</title>
  <link rel="icon" type="image/svg+xml" href="/static/app_icon_source.svg?v=7">
  <link rel="icon" type="image/x-icon" href="/static/app_icon.ico?v=7">
  <link rel="icon" type="image/png" sizes="256x256" href="/static/app_icon_256.png?v=7">
  <link rel="apple-touch-icon" href="/static/app_icon_256.png?v=7">
  <link rel="stylesheet" href="/static/style.css?v=20260310dark1">
</head>
<body class="theme-{{ ui_theme_mode|default('dark') }} ui-font-{{ ui_font_mode|default('default') }} {% if comic_mode %}comic-mode{% endif %}">
  <header id="appHeader">
    <div class="app-brand">
      <img class="app-brand-icon" src="/static/app_icon_source.svg?v=7" alt="">
      <h1>{{ tr("Label Enricher") }}</h1>
    </div>
    <div id="timeGreeting" class="time-greeting" aria-live="polite"></div>
    <div class="nav-row">
      <nav class="nav-links">
        <a href="/">{{ tr("Dashboard") }}</a>
        <a href="/items">{{ tr("Item Database") }}</a>
        <a href="/settings">{{ tr("Layout & Settings") }}</a>
        <a href="/batch-table">{{ tr("Batch Table") }}</a>
        <a href="/manual-entry">{{ tr("Manual Entry") }}</a>
      </nav>
      <div class="nav-right">
        <form class="nav-theme" action="/theme/mode-toggle" method="post">
          <button class="btn btn-md btn-outline" type="submit">{% if ui_theme_mode|default('dark') == 'dark' %}{{ tr("Dark: ON") }}{% else %}{{ tr("Dark: OFF") }}{% endif %}</button>
        </form>
        <form class="nav-comic" action="/theme/comic-toggle" method="post">
          <button class="btn btn-md btn-secondary" type="submit">{% if comic_mode %}{{ tr("Comic: ON") }}{% else %}{{ tr("Comic: OFF") }}{% endif %}</button>
        </form>
        <form class="nav-close" action="/app/close" method="post">
          <button id="closeAppBtn" class="btn btn-md btn-attn" type="button">{{ tr("Close App") }}</button>
        </form>
      </div>
    </div>
  </header>
  {% if message %}<div class="msg">{{ tr(message) }}</div>{% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="appConfirm" class="app-confirm" hidden>
    <div class="app-confirm-backdrop"></div>
    <div class="app-confirm-dialog card" role="dialog" aria-modal="true" aria-labelledby="appConfirmTitle">
      <h3 id="appConfirmTitle">{{ tr("Confirm Action") }}</h3>
      <p id="appConfirmMsg"></p>
      <div class="app-confirm-actions">
        <button id="appConfirmCancel" class="btn btn-secondary" type="button">{{ tr("Cancel") }}</button>
        <button id="appConfirmOk" class="btn btn-primary" type="button">{{ tr("Confirm") }}</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const el = document.getElementById('timeGreeting');
      if (!el) return;
      const morning = {{ tr("GOOD FUCKING MORNINGGGGGG DAPH")|tojson }};
      const afternoon = {{ tr("GOOD FUCKING AFTERNOONNNNNNN DAPH")|tojson }};
      const evening = {{ tr("GOOD FUCKING EVENINGGGGGGGG DAPH")|tojson }};
      const hour = new Date().getHours();
      if (hour < 12) el.textContent = morning;
      else if (hour < 18) el.textContent = afternoon;
      else el.textContent = evening;
    })();

    (function () {
      const pdfUrl = {{ (('/batch/view-pdf?path=' ~ (open_pdf|urlencode)) if open_pdf else '')|tojson }};
      if (!pdfUrl) return;
      try {
        window.open(pdfUrl, '_blank');
      } catch (err) {
      }
      try {
        const url = new URL(window.location.href);
        url.searchParams.delete('open_pdf');
        window.history.replaceState({}, '', url.toString());
      } catch (err) {
      }
    })();

    (function () {
      const header = document.getElementById('appHeader');
      if (!header) return;
      header.addEventListener('click', (e) => {
        const tgt = e.target;
        if (!(tgt instanceof Element)) return;
        if (tgt.closest('a, button, input, select, textarea, label, form')) return;
        window.location.href = '/';
      });
    })();

    (function () {
      const modal = document.getElementById('appConfirm');
      const msgEl = document.getElementById('appConfirmMsg');
      const okBtn = document.getElementById('appConfirmOk');
      const cancelBtn = document.getElementById('appConfirmCancel');
      const defaultMsg = {{ tr("Are you sure?")|tojson }};
      const okMsg = {{ tr("OK")|tojson }};
      if (!modal || !msgEl || !okBtn || !cancelBtn) return;

      window.showAppConfirm = function (message) {
        return new Promise((resolve) => {
          msgEl.textContent = message || defaultMsg;
          modal.hidden = false;
          const cleanup = () => {
            okBtn.onclick = null;
            cancelBtn.onclick = null;
            modal.hidden = true;
          };
          okBtn.onclick = () => { cleanup(); resolve(true); };
          cancelBtn.onclick = () => { cleanup(); resolve(false); };
        });
      };

      window.showAppAlert = function (message) {
        return window.showAppConfirm(message || okMsg).then(() => true);
      };

      const closeBtn = document.getElementById('closeAppBtn');
      const closeForm = closeBtn ? closeBtn.closest('form.nav-close') : null;

      function triggerCloseApp() {
        const action = (closeForm instanceof HTMLFormElement && closeForm.action) ? closeForm.action : '/app/close';
        try {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(action, new Blob([], { type: 'application/x-www-form-urlencoded' }));
          } else {
            fetch(action, { method: 'POST', keepalive: true }).catch(() => {});
          }
        } catch (err) {
          try {
            fetch(action, { method: 'POST', keepalive: true }).catch(() => {});
          } catch (innerErr) {
          }
        }
        const attemptClose = () => {
          try { window.close(); } catch (err) {}
        };
        attemptClose();
        setTimeout(attemptClose, 60);
        setTimeout(attemptClose, 180);
        setTimeout(() => {
          try {
            if (document.visibilityState === 'visible') {
              document.title = 'Label Enricher';
              document.body.innerHTML = '<main style="font: 16px/1.4 Segoe UI, Arial, sans-serif; padding: 32px; color: #203126;"><h2 style="margin:0 0 8px;">Peace out girl scout</h2><p style="margin:0;">The app is closed. If this tab did not auto-close, you can close it now.</p></main>';
            }
          } catch (err) {}
        }, 450);
      }

      closeBtn?.addEventListener('click', () => {
        triggerCloseApp();
      });

      document.addEventListener('submit', async (e) => {
        const form = e.target;
        if (!(form instanceof HTMLFormElement)) return;

        if (form.classList.contains('nav-close')) {
          e.preventDefault();
          triggerCloseApp();
          return;
        }

        const message = form.getAttribute('data-confirm');
        if (!message) return;
        e.preventDefault();
        let ok = false;
        try {
          ok = await window.showAppConfirm(message);
        } catch (err) {
          ok = true;
        }
        if (!ok) return;
        form.submit();
      }, true);
    })();
  </script>
</body>
</html>
